<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Z-Traces — User Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#050a0e; --surface:#0d1b24; --surface2:#0f2030;
      --border:#1a3a4a; --accent:#00d4ff; --accent2:#00ff9d;
      --warn:#ff6b35; --text:#cce8f0; --muted:#4a7a8a;
      --font-mono:'Share Tech Mono',monospace; --font-display:'Syne',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh;}

    /* Grid bg */
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;
      background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);
      background-size:40px 40px;
    }

    /* Topbar */
    .topbar{
      position:sticky;top:0;z-index:100;
      background:rgba(5,10,14,.95);backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 32px;height:56px;
    }
    .topbar-brand{font-family:var(--font-display);font-weight:800;font-size:1.1rem;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .topbar-info{display:flex;align-items:center;gap:20px;font-size:.75rem;color:var(--muted);}
    .badge{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);
      color:var(--accent);padding:3px 10px;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;}
    .btn-logout{background:none;border:1px solid var(--border);color:var(--muted);
      font-family:var(--font-mono);font-size:.7rem;padding:6px 14px;cursor:pointer;
      letter-spacing:.1em;transition:all .2s;}
    .btn-logout:hover{border-color:var(--warn);color:var(--warn);}

    .layout{display:block;min-height:calc(100vh - 56px);}

    /* Main area */
    .main{padding:28px 32px;}

    /* Section heading */
    .sec-head{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
    .sec-head h2{font-family:var(--font-display);font-weight:700;font-size:1rem;letter-spacing:.08em;}
    .sec-head::after{content:'';flex:1;height:1px;background:var(--border);}
    .tag{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;
      background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.25);
      color:var(--accent);padding:2px 8px;}

    /* Locate card */
    .locate-card{
      background:var(--surface);border:1px solid var(--border);
      padding:28px;position:relative;margin-bottom:24px;
    }
    .locate-card::before{content:'';position:absolute;top:-1px;left:-1px;
      width:14px;height:14px;border-top:2px solid var(--accent);border-left:2px solid var(--accent);}
    .locate-card::after{content:'';position:absolute;bottom:-1px;right:-1px;
      width:14px;height:14px;border-bottom:2px solid var(--accent2);border-right:2px solid var(--accent2);}

    /* Floor map visual */
    .floor-map{
      background:#070f15;border:1px solid var(--border);
      height:260px;margin-bottom:20px;position:relative;overflow:hidden;
      display:flex;align-items:center;justify-content:center;
    }
    .floor-map svg{width:100%;height:100%;}

    /* Ping dot */
    .ping-dot{
      position:absolute;width:16px;height:16px;
      background:var(--accent);border-radius:50%;
      transform:translate(-50%,-50%);
      box-shadow:0 0 0 0 rgba(0,212,255,0.6);
      animation:pingAnim 2s infinite;display:none;
      transition:left .8s ease, top .8s ease;
    }
    @keyframes pingAnim{
      0%{box-shadow:0 0 0 0 rgba(0,212,255,.6)}
      70%{box-shadow:0 0 0 18px rgba(0,212,255,0)}
      100%{box-shadow:0 0 0 0 rgba(0,212,255,0)}
    }

    .loc-info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;}
    .loc-chip{background:#070f15;border:1px solid var(--border);padding:14px 16px;}
    .loc-chip .lc-label{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
    .loc-chip .lc-val{font-family:var(--font-display);font-size:1.2rem;font-weight:700;color:var(--accent);}
    .loc-chip .lc-val.green{color:var(--accent2);}

    .btn-locate{
      background:transparent;border:1px solid var(--accent);
      color:var(--accent);font-family:var(--font-display);font-weight:700;
      font-size:.82rem;letter-spacing:.18em;text-transform:uppercase;
      padding:14px 28px;cursor:pointer;transition:all .25s;
      position:relative;overflow:hidden;
    }
    .btn-locate::before{content:'';position:absolute;inset:0;background:var(--accent);
      transform:translateX(-100%);transition:.25s;z-index:0;}
    .btn-locate:hover::before{transform:translateX(0);}
    .btn-locate:hover{color:var(--bg);}
    .btn-locate span{position:relative;z-index:1;}
    .btn-locate:disabled{opacity:.4;cursor:not-allowed;}
    .btn-locate.scanning span::after{content:' ...';animation:dots 1.2s infinite;}
    @keyframes dots{0%{content:' .'}33%{content:' ..'}66%{content:' ...'}100%{content:' .'}}

    /* Wi-Fi signals panel */
    .signal-list{display:flex;flex-direction:column;gap:8px;margin-top:16px;}
    .signal-row{
      display:flex;align-items:center;gap:12px;
      background:#070f15;border:1px solid var(--border);padding:10px 14px;
      font-size:.75rem;
    }
    .signal-ssid{flex:1;color:var(--text);}
    .signal-bssid{color:var(--muted);font-size:.68rem;flex:1;}
    .rssi-bar-wrap{width:80px;height:6px;background:#1a3a4a;border-radius:3px;overflow:hidden;}
    .rssi-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--warn),var(--accent));transition:width .5s;}
    .rssi-val{color:var(--accent2);font-size:.72rem;min-width:42px;text-align:right;}


  </style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">Z-TRACES</div>
  <div class="topbar-info">
    <span class="badge">USER</span>
    <span id="userName">Loading...</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="layout">
  <!-- Main -->
  <div class="main">
    <div class="sec-head">
      <h2>Locate Current Position</h2>
      <span class="tag">Real-time</span>
    </div>

    <div class="locate-card">
      <!-- Floor Map -->
      <div class="floor-map" id="floorMap">
        <svg viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
          <defs>
            <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
              <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(26,58,74,0.25)" stroke-width="0.5"/>
            </pattern>
          </defs>

          <!-- Grid background -->
          <rect width="600" height="320" fill="url(#grid)"/>

          <!-- ── Corridor strip (left) ── -->
          <rect x="0" y="0" width="38" height="320" fill="rgba(10,20,28,0.5)" stroke="rgba(26,58,74,0.4)" stroke-width="1"/>
          <text x="19" y="175" fill="rgba(74,122,138,0.3)" font-size="6" font-family="monospace"
                text-anchor="middle" transform="rotate(-90,19,160)">CORRIDOR</text>

          <!-- ── Main room fill ── -->
          <rect x="38" y="15" width="554" height="290" fill="rgba(13,27,36,0.85)"/>

          <!-- ── Thick outer walls ── -->
          <rect x="38" y="15" width="554" height="290" fill="none" stroke="#1f4a5e" stroke-width="3"/>
          <!-- Inner wall highlight -->
          <rect x="42" y="19" width="546" height="282" fill="none" stroke="rgba(0,212,255,0.06)" stroke-width="1"/>

          <!-- ── GATE — erase wall + frame ── -->

          <rect x="35" y="148" width="8" height="24" fill="#060d12"/>
          <!-- Gate frame -->

          <!-- Door swing arc -->
          <path d="M 40,148 A 20,20 0 0,1 60,168" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="1" stroke-dasharray="2,3"/>
          <!-- Gate label -->
          <text x="4" y="164" fill="#00d4ff" font-size="7" font-family="monospace" font-weight="bold">GATE</text>

          <!-- ── Screen / Board on left inner wall ── -->
          <rect x="42" y="80" width="7" height="80" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.25)" stroke-width="1" stroke-dasharray="2,2"/>
          <text x="57" y="124" fill="rgba(0,212,255,0.4)" font-size="6" font-family="monospace"
                transform="rotate(-90,52,120)">SCREEN</text>

          <!-- ── Student desks — Row 1 (front) ── -->
          <rect x="120" y="28" width="55" height="22" fill="rgba(15,32,45,0.9)" stroke="rgba(26,58,74,0.7)" stroke-width="0.8"/>
          <rect x="185" y="28" width="55" height="22" fill="rgba(15,32,45,0.9)" stroke="rgba(26,58,74,0.7)" stroke-width="0.8"/>
          <rect x="250" y="28" width="55" height="22" fill="rgba(15,32,45,0.9)" stroke="rgba(26,58,74,0.7)" stroke-width="0.8"/>
          <rect x="315" y="28" width="55" height="22" fill="rgba(15,32,45,0.9)" stroke="rgba(26,58,74,0.7)" stroke-width="0.8"/>
          <rect x="380" y="28" width="55" height="22" fill="rgba(15,32,45,0.9)" stroke="rgba(26,58,74,0.7)" stroke-width="0.8"/>

          <!-- ── Student desks — Row 2 (middle) ── -->
          <rect x="120" y="149" width="55" height="22" fill="rgba(15,32,45,0.9)" stroke="rgba(26,58,74,0.7)" stroke-width="0.8"/>
          <rect x="185" y="149" width="55" height="22" fill="rgba(15,32,45,0.9)" stroke="rgba(26,58,74,0.7)" stroke-width="0.8"/>
          <rect x="250" y="149" width="55" height="22" fill="rgba(15,32,45,0.9)" stroke="rgba(26,58,74,0.7)" stroke-width="0.8"/>
          <rect x="315" y="149" width="55" height="22" fill="rgba(15,32,45,0.9)" stroke="rgba(26,58,74,0.7)" stroke-width="0.8"/>
          <rect x="380" y="149" width="55" height="22" fill="rgba(15,32,45,0.9)" stroke="rgba(26,58,74,0.7)" stroke-width="0.8"/>

          <!-- ── Student desks — Row 3 (back) ── -->
          <rect x="120" y="248" width="55" height="22" fill="rgba(15,32,45,0.9)" stroke="rgba(26,58,74,0.7)" stroke-width="0.8"/>
          <rect x="185" y="248" width="55" height="22" fill="rgba(15,32,45,0.9)" stroke="rgba(26,58,74,0.7)" stroke-width="0.8"/>
          <rect x="250" y="248" width="55" height="22" fill="rgba(15,32,45,0.9)" stroke="rgba(26,58,74,0.7)" stroke-width="0.8"/>
          <rect x="315" y="248" width="55" height="22" fill="rgba(15,32,45,0.9)" stroke="rgba(26,58,74,0.7)" stroke-width="0.8"/>
          <rect x="380" y="248" width="55" height="22" fill="rgba(15,32,45,0.9)" stroke="rgba(26,58,74,0.7)" stroke-width="0.8"/>

          <!-- ── Teacher desk (front right) ── -->
          <rect x="470" y="22" width="100" height="35" fill="rgba(20,40,55,0.9)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
          <text x="520" y="43" fill="rgba(0,212,255,0.3)" font-size="6" font-family="monospace" text-anchor="middle">TEACHER</text>

          <!-- ── Row separator lines ── -->
          <line x1="42" y1="110" x2="590" y2="110" stroke="rgba(26,58,74,0.3)" stroke-width="0.5" stroke-dasharray="4,6"/>
          <line x1="42" y1="205" x2="590" y2="205" stroke="rgba(26,58,74,0.3)" stroke-width="0.5" stroke-dasharray="4,6"/>

          <!-- ── Room number ── -->
          <text x="300" y="145" fill="rgba(0,212,255,0.1)" font-size="28" font-family="monospace"
                font-weight="bold" text-anchor="middle">311</text>

          <!-- ── All 10 fingerprint reference points ── -->
          <!-- GATE -->
          <circle cx="20" cy="160" r="5" fill="rgba(255,107,53,0.1)" stroke="rgba(255,107,53,0.4)" stroke-width="1"/>
          <circle cx="20" cy="160" r="2" fill="rgba(255,107,53,0.6)"/>

          <!-- FL -->
          <circle cx="60" cy="40" r="5" fill="rgba(0,255,157,0.1)" stroke="rgba(0,255,157,0.35)" stroke-width="1"/>
          <circle cx="60" cy="40" r="2" fill="rgba(0,255,157,0.6)"/>
          <text x="66" y="52" fill="rgba(0,255,157,0.5)" font-size="6" font-family="monospace">FL</text>

          <!-- FC -->
          <circle cx="300" cy="40" r="5" fill="rgba(0,255,157,0.1)" stroke="rgba(0,255,157,0.35)" stroke-width="1"/>
          <circle cx="300" cy="40" r="2" fill="rgba(0,255,157,0.6)"/>
          <text x="306" y="52" fill="rgba(0,255,157,0.5)" font-size="6" font-family="monospace">FC</text>

          <!-- FR -->
          <circle cx="540" cy="40" r="5" fill="rgba(0,255,157,0.1)" stroke="rgba(0,255,157,0.35)" stroke-width="1"/>
          <circle cx="540" cy="40" r="2" fill="rgba(0,255,157,0.6)"/>
          <text x="518" y="52" fill="rgba(0,255,157,0.5)" font-size="6" font-family="monospace">FR</text>

          <!-- WL -->
          <circle cx="60" cy="160" r="5" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.35)" stroke-width="1"/>
          <circle cx="60" cy="160" r="2" fill="rgba(0,212,255,0.6)"/>
          <text x="66" y="157" fill="rgba(0,212,255,0.5)" font-size="6" font-family="monospace">WL</text>

          <!-- CN -->
          <circle cx="300" cy="160" r="5" fill="rgba(176,108,255,0.1)" stroke="rgba(176,108,255,0.35)" stroke-width="1"/>
          <circle cx="300" cy="160" r="2" fill="rgba(176,108,255,0.6)"/>
          <text x="306" y="157" fill="rgba(176,108,255,0.5)" font-size="6" font-family="monospace">CN</text>

          <!-- WR -->
          <circle cx="540" cy="160" r="5" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.35)" stroke-width="1"/>
          <circle cx="540" cy="160" r="2" fill="rgba(0,212,255,0.6)"/>
          <text x="518" y="157" fill="rgba(0,212,255,0.5)" font-size="6" font-family="monospace">WR</text>

          <!-- BL -->
          <circle cx="60" cy="280" r="5" fill="rgba(0,255,157,0.1)" stroke="rgba(0,255,157,0.35)" stroke-width="1"/>
          <circle cx="60" cy="280" r="2" fill="rgba(0,255,157,0.6)"/>
          <text x="66" y="277" fill="rgba(0,255,157,0.5)" font-size="6" font-family="monospace">BL</text>

          <!-- BC -->
          <circle cx="300" cy="280" r="5" fill="rgba(0,255,157,0.1)" stroke="rgba(0,255,157,0.35)" stroke-width="1"/>
          <circle cx="300" cy="280" r="2" fill="rgba(0,255,157,0.6)"/>
          <text x="306" y="277" fill="rgba(0,255,157,0.5)" font-size="6" font-family="monospace">BC</text>

          <!-- BR -->
          <circle cx="540" cy="280" r="5" fill="rgba(0,255,157,0.1)" stroke="rgba(0,255,157,0.35)" stroke-width="1"/>
          <circle cx="540" cy="280" r="2" fill="rgba(0,255,157,0.6)"/>
          <text x="518" y="277" fill="rgba(0,255,157,0.5)" font-size="6" font-family="monospace">BR</text>

          <!-- ── Router APs ── -->
          <!-- B1 — Corridor (top, outside) -->
          <circle cx="20" cy="10" r="10" fill="none" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
          <circle cx="20" cy="10" r="6"  fill="none" stroke="rgba(0,212,255,0.35)" stroke-width="1"/>
          <circle cx="20" cy="10" r="2.5" fill="rgba(0,212,255,0.7)"/>
          <text x="32" y="13" fill="rgba(74,122,138,0.8)" font-size="6" font-family="monospace" font-weight="bold">B1</text>

          <!-- B2 — Room (top center) -->
          <circle cx="300" cy="10" r="10" fill="none" stroke="rgba(0,255,157,0.2)" stroke-width="1"/>
          <circle cx="300" cy="10" r="6"  fill="none" stroke="rgba(0,255,157,0.35)" stroke-width="1"/>
          <circle cx="300" cy="10" r="2.5" fill="rgba(0,255,157,0.7)"/>

          <!-- B3 — Other (bottom center) -->

          <circle cx="300" cy="312" r="6"  fill="none" stroke="rgba(176,108,255,0.35)" stroke-width="1"/>

          <!-- Floor label -->

                text-anchor="end" id="floorLabel">FLOOR: 3</text>
        </svg>
        <div class="ping-dot" id="pingDot"></div>
      </div>

      <!-- Info chips -->
      <div class="loc-info-grid">
        <div class="loc-chip">
          <div class="lc-label">Floor</div>
          <div class="lc-val" id="chipFloor">—</div>
        </div>
        <div class="loc-chip">
          <div class="lc-label">X, Y Coords</div>
          <div class="lc-val" id="chipCoords">—</div>
        </div>
        <div class="loc-chip">
          <div class="lc-label">Area</div>
          <div class="lc-val green" id="chipArea">—</div>
        </div>

      <button class="btn-locate" id="locBtn" onclick="localize()"><span>Scan &amp; Locate</span></button>

      <!-- Agent Status Bar -->
      <div style="margin-top:14px;display:flex;align-items:center;gap:10px;font-size:.68rem;">
        <span id="agentDot" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--muted);transition:all .3s;flex-shrink:0;"></span>
        <span id="agentText" style="color:var(--muted);">Agent status checking...</span>
      </div>
    </div>

    <!-- Wi-Fi signals -->
    <div class="sec-head" style="margin-top:8px;">
      <h2>Detected Wi-Fi Signals</h2>
      <span id="signalSource" style="font-size:.65rem;color:var(--muted);padding:2px 8px;border:1px solid var(--border);margin-left:8px;"></span>
    </div>
    <div class="signal-list" id="signalList">
      <div style="color:var(--muted);font-size:.75rem;padding:16px;">Click "Scan & Locate" to detect signals.</div>
    </div>
  </div>
