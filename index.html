<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Z-Traces — Indoor Positioning System</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #050a0e;
      --surface: #0d1b24;
      --border: #1a3a4a;
      --accent: #00d4ff;
      --accent2: #00ff9d;
      --warn: #ff6b35;
      --text: #cce8f0;
      --muted: #4a7a8a;
      --font-mono: 'Share Tech Mono', monospace;
      --font-display: 'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove { to { background-position: 40px 40px; } }
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes pulse { 0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)} }
    .login-wrap {
      position: relative; z-index: 10;
      width: 420px;
      animation: fadeUp .6s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }
    .brand { text-align: center; margin-bottom: 32px; }
    .brand-signal { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }
    .signal-bars { display: flex; align-items: flex-end; gap: 3px; height: 24px; }
    .signal-bars span {
      width: 4px; background: var(--accent);
      border-radius: 2px;
      animation: signalAnim 1.4s ease-in-out infinite;
    }
    .signal-bars span:nth-child(1){height:6px;animation-delay:0s}
    .signal-bars span:nth-child(2){height:12px;animation-delay:.15s}
    .signal-bars span:nth-child(3){height:18px;animation-delay:.3s}
    .signal-bars span:nth-child(4){height:24px;animation-delay:.45s}
    @keyframes signalAnim { 0%,100%{opacity:.3} 50%{opacity:1} }
    .brand h1 {
      font-family: var(--font-display);
      font-size: 2.4rem; font-weight: 800;
      letter-spacing: .1em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand p { font-size: .72rem; color: var(--muted); letter-spacing: .2em; text-transform: uppercase; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 36px 32px;
      position: relative;
      box-shadow: 0 0 40px rgba(0,212,255,0.06), inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .card::before, .card::after { content: ''; position: absolute; width: 12px; height: 12px; }
    .card::before { top: -1px; left: -1px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .card::after  { bottom: -1px; right: -1px; border-bottom: 2px solid var(--accent2); border-right: 2px solid var(--accent2); }
    .section-label {
      font-size: .65rem; letter-spacing: .25em; color: var(--accent);
      text-transform: uppercase; margin-bottom: 24px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label::after { content:''; flex:1; height:1px; background:var(--border); }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: .7rem; letter-spacing: .15em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    input {
      width: 100%; background: #070f15;
      border: 1px solid var(--border); border-radius: 1px;
      color: var(--text); font-family: var(--font-mono); font-size: .9rem;
      padding: 12px 14px;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,212,255,0.12); }
    input::placeholder { color: var(--muted); }
    .role-select { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 20px; }
    .role-btn {
      background: #070f15; border: 1px solid var(--border);
      color: var(--muted); font-family: var(--font-mono); font-size: .72rem;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 10px 6px; cursor: pointer; transition: all .2s; border-radius: 1px;
    }
    .role-btn:hover { border-color: var(--accent); color: var(--accent); }
    .role-btn.active {
      border-color: var(--accent); color: var(--accent);
      background: rgba(0,212,255,0.08);
      box-shadow: 0 0 12px rgba(0,212,255,0.15);
    }
    .btn-login {
      width: 100%; background: transparent;
      border: 1px solid var(--accent); color: var(--accent);
      font-family: var(--font-display); font-weight: 700;
      font-size: .85rem; letter-spacing: .2em; text-transform: uppercase;
      padding: 14px; cursor: pointer;
      transition: all .25s; position: relative; overflow: hidden;
    }
    .btn-login::before {
      content: ''; position: absolute; inset: 0;
      background: var(--accent); transform: translateX(-100%); transition: transform .25s; z-index: 0;
    }
    .btn-login:hover::before { transform: translateX(0); }
    .btn-login:hover { color: var(--bg); }
    .btn-login span { position: relative; z-index: 1; }
    .status-line { margin-top: 20px; font-size: .68rem; color: var(--muted); display: flex; align-items: center; gap: 8px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); animation: blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.2} }
    .error-msg {
      background: rgba(255,107,53,0.1); border: 1px solid rgba(255,107,53,0.4);
      color: var(--warn); font-size: .75rem; padding: 10px 12px;
      margin-bottom: 16px; display: none;
    }
    .error-msg.show { display: block; }
    .auth-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .auth-tab { flex: 1; text-align: center; padding: 12px; font-size: .75rem; letter-spacing: .15em; text-transform: uppercase; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: all .2s; }
    .auth-tab:hover { color: var(--text); }
    .auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .signup-field { display: none; }
    .mode-signup .signup-field { display: block; }
    .mode-signup .login-field { display: none; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-signal">
      <div class="signal-bars">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>
    <h1>Z-TRACES</h1>
    <p>Wi-Fi Indoor Positioning System · ALPHACODERS</p>
  </div>

  <div class="card" id="authCard">
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="setMode('login')">Log In</div>
      <div class="auth-tab" onclick="setMode('signup')">Sign Up</div>
    </div>

    <div id="errorMsg" class="error-msg"></div>

    <div class="form-group">
      <label>Select Role</label>
      <div class="role-select">
        <button class="role-btn active" onclick="selectRole(this,'user')">User</button>
        <button class="role-btn" onclick="selectRole(this,'admin')">Admin</button>
        <button class="role-btn" onclick="selectRole(this,'operator')">Operator</button>
      </div>
    </div>

    <div class="form-group signup-field">
      <label>Full Name</label>
      <input type="text" id="fullname" placeholder="Enter your full name" autocomplete="off"/>
    </div>
    
    <div class="form-group signup-field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="Enter your email" autocomplete="off"/>
    </div>

    <div class="form-group">
      <label>Username / Email</label>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="off"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>

    <button class="btn-login" id="authBtn" onclick="doAuth()"><span>Authenticate &rarr;</span></button>

    <div class="status-line">
      <span class="dot"></span>
      <span>System Online &mdash; Fingerprint DB Connected</span>
    </div>
  </div>
</div>

<script>
  let selectedRole = 'user';
  let authMode = 'login'; // 'login' or 'signup'

  function setMode(mode) {
    authMode = mode;
    const card = document.getElementById('authCard');
    const tabs = document.querySelectorAll('.auth-tab');
    
    tabs[0].classList.toggle('active', mode === 'login');
    tabs[1].classList.toggle('active', mode === 'signup');
    
    if (mode === 'signup') {
      card.classList.add('mode-signup');
      document.getElementById('authBtn').innerHTML = '<span>Sign Up &rarr;</span>';
    } else {
      card.classList.remove('mode-signup');
      document.getElementById('authBtn').innerHTML = '<span>Log In &rarr;</span>';
    }
    document.getElementById('errorMsg').classList.remove('show');
  }

  function selectRole(btn, role) {
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedRole = role;
  }

  async function doAuth() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const fullname = document.getElementById('fullname').value.trim();
    const email    = document.getElementById('email').value.trim();
    const errEl    = document.getElementById('errorMsg');
    errEl.classList.remove('show');

    if (!username || !password) {
      errEl.textContent = 'Please enter both username and password.';
      errEl.classList.add('show');
      return;
    }

    if (authMode === 'signup' && (!fullname || !email)) {
      errEl.textContent = 'Please enter all fields to sign up.';
      errEl.classList.add('show');
      return;
    }

    try {
      const endpoint = authMode === 'signup' ? '/api/signup' : '/api/login';
      const bodyPayload = authMode === 'signup' 
        ? { username, password, name: fullname, email, role: selectedRole }
        : { username, password, role: selectedRole };

      const res  = await fetch(endpoint, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(bodyPayload)
      });
      const data = await res.json();

      if (res.ok && data.success) {
        localStorage.setItem('zt_token', data.token);
        localStorage.setItem('zt_role',  data.role);
        localStorage.setItem('zt_user',  JSON.stringify(data.user));
        const redirectMap = {
          admin:    'admin_dashboard.html',
          operator: 'operator_dashboard.html',
          user:     'user_dashboard.html'
        };
        window.location.href = redirectMap[data.role] || 'user_dashboard.html';
      } else {
        errEl.textContent = data.error || data.message || 'Authentication failed.';
        errEl.classList.add('show');
      }
    } catch (e) {
      errEl.textContent = 'Server not running. Please start backend — run start.bat or python app.py';
      errEl.classList.add('show');
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(); });
</script>
</body>
</html>
